<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Script Hub</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}
#logo{
font-size:60px;
text-align:center;
color:#00ffc8;
margin:20px;
}
nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}
nav button{
padding:10px 20px;
background:#00ffc8;
border:none;
border-radius:5px;
cursor:pointer;
}
.page{
display:none;
padding:20px;
}
.active{
display:block;
}
.grid{
display:flex;
flex-direction:column;
gap:15px;
}
.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #00ffc8;
}
input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
background:#222;
border:none;
border-radius:5px;
color:white;
}
button{
margin-top:10px;
cursor:pointer;
}
#userInfo{
position:fixed;
top:10px;
right:10px;
display:flex;
align-items:center;
gap:10px;
color:#00ffc8;
}
#userInfo img{
width:40px;
height:40px;
border-radius:50%;
}
</style>
</head>

<body>

<div id="logo">AT™</div>

<nav>
<button onclick="showPage('games')">Games</button>
<button onclick="showPage('scripts')">Scripts</button>
<button onclick="showPage('upload')">Upload</button>
<button id="loginBtn" onclick="showPage('login')">Login</button>
</nav>

<div id="userInfo" style="display:none;">
<img id="userPhoto" src="">
<span id="userEmail"></span>
<span>V.1.0.0</span>
<button onclick="logout()">Logout</button>
</div>

<div id="login" class="page active">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<div id="games" class="page">
<h2>Games</h2>
<div id="gameList" class="grid"></div>
</div>

<div id="scripts" class="page">
<h2>Scripts</h2>
<div id="scriptList" class="grid"></div>
</div>

<div id="upload" class="page">
<h2 id="uploadTitle">Upload</h2>
<select id="uploadType">
<option value="game">Game</option>
<option value="script">Script</option>
</select>
<input id="itemName" placeholder="Nama">
<input id="itemLink" placeholder="Link">
<textarea id="itemCode" placeholder="Script Code"></textarea>
<button onclick="uploadItem()" id="uploadBtn">Upload</button>
<button onclick="cancelEdit()" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
getDoc,
updateDoc,
increment,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyBZPDqoF3pqPvVXVigbfBlolHAakohx_VY",
authDomain: "at-data-174bc.firebaseapp.com",
projectId: "at-data-174bc",
storageBucket: "at-data-174bc.firebasestorage.app",
messagingSenderId: "278571146405",
appId: "1:278571146405:web:bb7fbacf8ec3fb54fec14c",
measurementId: "G-8PYQB40E2B"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)

let currentUser=null
let editingId=null
let editingType=null

window.showPage=function(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}

window.register=async function(){
try{
await createUserWithEmailAndPassword(auth,email.value,password.value)
loginMsg.innerText="Register berhasil"
}catch(e){loginMsg.innerText=e.message}
}

window.login=async function(){
try{
await signInWithEmailAndPassword(auth,email.value,password.value)
loginMsg.innerText="Login berhasil"
}catch(e){loginMsg.innerText=e.message}
}

window.logout=function(){
signOut(auth)
currentUser=null
userInfo.style.display="none"
loginBtn.style.display="inline-block"
}

onAuthStateChanged(auth,user=>{
currentUser=user
if(user){
loginBtn.style.display="none"
userInfo.style.display="flex"
userEmail.innerText=user.email
userPhoto.src=`https://ui-avatars.com/api/?name=${user.email}`
}
loadItems()
})

window.uploadItem=async function(){
if(!currentUser){alert("Login dulu");return}

let type=uploadType.value
let name=itemName.value
let link=itemLink.value
let code=itemCode.value

if(!name || (type==="game" && !link) || (type==="script" && !code)){alert("Lengkapi semua field");return}

if(editingId){
await updateDoc(doc(db,type+"s",editingId),{name,link,code})
editingId=null
editingType=null
uploadTitle.innerText="Upload"
uploadBtn.innerText="Upload"
cancelEditBtn.style.display="none"
}else{
await addDoc(collection(db,type+"s"),{
name,link,code,
user:currentUser.email,
views:0
})
}

itemName.value=""
itemLink.value=""
itemCode.value=""
loadItems()
}

window.cancelEdit=function(){
editingId=null
editingType=null
uploadTitle.innerText="Upload"
uploadBtn.innerText="Upload"
cancelEditBtn.style.display="none"
itemName.value=""
itemLink.value=""
itemCode.value=""
}

window.editItem=function(id,type,data){
if(!currentUser || currentUser.email!==data.user){alert("Bukan punya kamu");return}
editingId=id
editingType=type
uploadType.value=type
itemName.value=data.name
itemLink.value=data.link
itemCode.value=data.code
uploadTitle.innerText="Edit Item"
uploadBtn.innerText="Save Edit"
cancelEditBtn.style.display="inline-block"
showPage("upload")
}

window.playGame=async function(id,link){
if(!currentUser){alert("Login dulu");return}
let viewRef=doc(db,"views",id+"_"+currentUser.uid)
let snap=await getDoc(viewRef)
if(!snap.exists()){
await setDoc(viewRef,{itemId:id,userId:currentUser.uid})
await updateDoc(doc(db,"games",id),{views:increment(1)})
}
window.open(link,"_blank")
}

window.copyScript=async function(id,code){
if(!currentUser){alert("Login dulu");return}
let viewRef=doc(db,"views",id+"_"+currentUser.uid)
let snap=await getDoc(viewRef)
if(!snap.exists()){
await setDoc(viewRef,{itemId:id,userId:currentUser.uid})
await updateDoc(doc(db,"scripts",id),{views:increment(1)})
}
navigator.clipboard.writeText(code)
alert("Script dicopy")
}

async function loadItems(){

gameList.innerHTML=""
let gameSnap=await getDocs(collection(db,"games"))
gameSnap.forEach(d=>{
let g=d.data()
let id=d.id
if(!g.views){g.views=0}
let editBtn=""
if(currentUser && currentUser.email===g.user){
editBtn=`<button onclick='editItem("${id}","game",${JSON.stringify(g)})'>Edit</button>`
}
let card=document.createElement("div")
card.className="card"
card.innerHTML=`
<h3>${g.name}</h3>
<p>👁 ${g.views}</p>
<button onclick="playGame('${id}','${g.link}')">Play</button>
${editBtn}
`
gameList.appendChild(card)
})

scriptList.innerHTML=""
let scriptSnap=await getDocs(collection(db,"scripts"))
scriptSnap.forEach(d=>{
let s=d.data()
let id=d.id
if(!s.views){s.views=0}
let editBtn=""
if(currentUser && currentUser.email===s.user){
editBtn=`<button onclick='editItem("${id}","script",${JSON.stringify(s)})'>Edit</button>`
}
let card=document.createElement("div")
card.className="card"
card.innerHTML=`
<h3>${s.name}</h3>
<p>👁 ${s.views}</p>
<pre>${s.code}</pre>
<button onclick="copyScript('${id}',\`${s.code}\`)">Copy</button>
${editBtn}
`
scriptList.appendChild(card)
})

}

loadItems()

</script>

</body>
</html>
