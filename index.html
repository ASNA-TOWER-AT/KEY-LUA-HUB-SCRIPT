<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Script Hub V.5.0.0</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  margin:0;
}
#logo{
  font-size:60px;
  text-align:center;
  color:#00ffc8;
  margin:20px;
}
nav{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
nav button{
  padding:10px 20px;
  background:#00ffc8;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.page{
  display:none;
  padding:20px;
}
.active{
  display:block;
}
.grid{
  display:flex;
  flex-direction:column;
  gap:15px;
}
.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px #00ffc8;
}
input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#222;
  border:none;
  border-radius:5px;
  color:white;
}
button{
  margin-top:10px;
}
#userInfo{
  position:fixed;
  top:10px;
  right:10px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
}
#userInfo img{
  width:40px;
  height:40px;
  border-radius:50%;
}
</style>
</head>
<body>

<div id="logo">AT™ Script Hub</div>

<div id="userInfo" style="display:none">
  <img id="userPhoto" src="" alt="Foto Email">
  <span id="userEmail">email@example.com</span>
  <span>V.5.0.0</span>
  <button onclick="logout()">Logout</button>
</div>

<nav>
  <button onclick="showPage('games')">Games</button>
  <button onclick="showPage('scripts')">Scripts</button>
  <button onclick="showPage('upload')">Upload</button>
  <button id="loginBtn" onclick="showPage('login')">Login</button>
</nav>

<div id="login" class="page">
  <h2>Login / Register</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <p id="loginMsg"></p>
</div>

<div id="games" class="page active">
  <h2>Games</h2>
  <div id="gameList" class="grid"></div>
</div>

<div id="scripts" class="page">
  <h2>Scripts</h2>
  <div id="scriptList" class="grid"></div>
</div>

<div id="upload" class="page">
  <h2>Upload</h2>
  <select id="uploadType" onchange="updateUploadFields()">
    <option value="game">Game</option>
    <option value="script">Script</option>
  </select>
  <input id="itemName" placeholder="Nama" required>
  <input id="itemLink" placeholder="Link (untuk game)" required>
  <textarea id="itemCode" placeholder="Script Code (untuk script)"></textarea>
  <textarea id="itemDesc" placeholder="Deskripsi (opsional)"></textarea>
  <button onclick="uploadItem()">Upload</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZPDqoF3pqPvVXVigbfBlolHAakohx_VY",
  authDomain: "at-data-174bc.firebaseapp.com",
  projectId: "at-data-174bc",
  storageBucket: "at-data-174bc.firebasestorage.app",
  messagingSenderId: "278571146405",
  appId: "1:278571146405:web:bb7fbacf8ec3fb54fec14c",
  measurementId: "G-8PYQB40E2B"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let viewedGames = new Set();

window.showPage=function(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
};

window.register = async function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;
  try{
    await createUserWithEmailAndPassword(auth,email,pass);
    loginMsg.innerText="Register berhasil";
  } catch(e){
    loginMsg.innerText=e.message;
  }
};

window.login = async function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;
  try{
    await signInWithEmailAndPassword(auth,email,pass);
    loginMsg.innerText="Login berhasil";
  } catch(e){
    loginMsg.innerText=e.message;
  }
};

window.logout = function(){
  signOut(auth);
};

window.updateUploadFields = function(){
  const type = document.getElementById("uploadType").value;
  if(type === 'game'){
    document.getElementById("itemLink").style.display = 'block';
    document.getElementById("itemCode").style.display = 'none';
  } else {
    document.getElementById("itemLink").style.display = 'block';
    document.getElementById("itemCode").style.display = 'block';
  }
};

window.uploadItem=async function(){
  if(!currentUser){
    alert("Login dulu");
    return;
  }
  let type=document.getElementById("uploadType").value;
  let name=document.getElementById("itemName").value;
  let link=document.getElementById("itemLink").value;
  let code=document.getElementById("itemCode").value;
  let desc=document.getElementById("itemDesc").value;

  if(!name || (type==='game' && !link) || (type==='script' && !code)){
    alert("Lengkapi semua field yang diperlukan!");
    return;
  }

  await addDoc(collection(db,type+"s"),{
    name, link, code, desc, user:currentUser.email, views:0
  });

  loadItems();
};

window.playGame = async function(id,link){
  if(!viewedGames.has(id)){
    const docRef = doc(db,"games",id);
    await updateDoc(docRef, {views:1});
    viewedGames.add(id);
  }
  window.open(link);
};

window.copyScript = function(code){
  navigator.clipboard.writeText(code);
  alert("Script copied!");
};

window.editScript = function(id){
  alert("Hanya pemilik atau admin yang bisa edit script");
};

/* DELETE AMAN */
window.deleteItem = async function(type,id){
  if(!currentUser) return;

  const docRef = doc(db,type,id);
  const snap = await getDoc(docRef);

  if(!snap.exists()) return;

  const data = snap.data();

  if(currentUser.email !== data.user && currentUser.email !== "evosrezasyah@gmail.com"){
    alert("Kamu tidak punya izin untuk menghapus ini!");
    return;
  }

  await deleteDoc(docRef);
  loadItems();
};

async function loadItems(){
  const gameList=document.getElementById("gameList");
  gameList.innerHTML="";
  const gameSnap=await getDocs(collection(db,"games"));
  gameSnap.forEach(docItem=>{
    let g=docItem.data();
    let card=document.createElement("div");
    card.className="card";
    let actions='';
    if(currentUser && (currentUser.email===g.user || currentUser.email==='evosrezasyah@gmail.com')){
      actions=`<button onclick="editScript('${docItem.id}')">Edit</button><button onclick="deleteItem('games','${docItem.id}')">Delete</button>`;
    }
    card.innerHTML=`
      <h3>${g.name}</h3>
      <p>${g.desc || ''}</p>
      <button onclick="playGame('${docItem.id}','${g.link}')">Play</button>
      ${actions}
    `;
    gameList.appendChild(card);
  });

  const scriptList=document.getElementById("scriptList");
  scriptList.innerHTML="";
  const scriptSnap=await getDocs(collection(db,"scripts"));
  scriptSnap.forEach(docItem=>{
    let s=docItem.data();
    let card=document.createElement("div");
    card.className="card";
    let actions='';
    if(currentUser && (currentUser.email===s.user || currentUser.email==='evosrezasyah@gmail.com')){
      actions=`<button onclick="editScript('${docItem.id}')">Edit</button><button onclick="deleteItem('scripts','${docItem.id}')">Delete</button>`;
    }
    card.innerHTML=`
      <h3>${s.name}</h3>
      <p>${s.desc || ''}</p>
      <pre>${s.code}</pre>
      <button onclick="copyScript('${s.code}')">Copy</button>
      ${actions}
    `;
    scriptList.appendChild(card);
  });
}

onAuthStateChanged(auth,user=>{
  currentUser=user;
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("loginBtn").style.display="none";
    document.getElementById("userInfo").style.display="flex";
    document.getElementById("userEmail").innerText=user.email;
    document.getElementById("userPhoto").src=`https://www.gravatar.com/avatar/${md5(user.email.trim().toLowerCase())}?d=identicon`;
  } else {
    document.getElementById("login").style.display="block";
    document.getElementById("loginBtn").style.display="inline-block";
    document.getElementById("userInfo").style.display="none";
  }
});

loadItems();

function md5(str) {
  return str.split('').reduce((hash,char)=> {
    hash=((hash<<5)-hash)+char.charCodeAt(0);
    return hash & hash;
  },0);
}

</script>
</body>
</html>
