<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Script Hub V1.0.0</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

#logo{
font-size:60px;
text-align:center;
color:#00ffc8;
margin:20px;
}

nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

nav button{
padding:10px 20px;
background:#00ffc8;
border:none;
border-radius:5px;
cursor:pointer;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.grid{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #00ffc8;
position:relative;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
background:#222;
border:none;
border-radius:5px;
color:white;
}

button{
margin-top:10px;
}

#userInfo{
display:none;
position:fixed;
top:10px;
right:10px;
align-items:center;
gap:5px;
color:white;
}

#userInfo img{
width:35px;
height:35px;
border-radius:50%;
}

#versionLabel{
font-size:14px;
color:#00ffc8;
margin-left:10px;
}
</style>
</head>

<body>

<div id="logo">AT™</div>

<nav>
<button onclick="showPage('games')">Games</button>
<button onclick="showPage('scripts')">Scripts</button>
<button onclick="showPage('upload')">Upload</button>
<button id="loginBtn" onclick="showPage('login')">Login</button>
</nav>

<div id="userInfo">
<img id="userPhoto" src="">
<span id="userEmail"></span>
<span id="versionLabel">V.1.0.0</span>
<button onclick="logout()">Logout</button>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<!-- GAMES -->
<div id="games" class="page">
<h2>Games</h2>
<div id="gameList" class="grid"></div>
</div>

<!-- SCRIPTS -->
<div id="scripts" class="page">
<h2>Scripts</h2>
<div id="scriptList" class="grid"></div>
</div>

<!-- UPLOAD -->
<div id="upload" class="page">
<h2>Upload</h2>
<select id="uploadType" onchange="updateUploadForm()">
<option value="game">Game</option>
<option value="script">Script</option>
</select>
<input id="itemName" placeholder="Nama">
<input id="itemLink" placeholder="Link / Kosong untuk script">
<textarea id="itemCode" placeholder="Script Code / Kosong untuk game"></textarea>
<textarea id="itemDesc" placeholder="Deskripsi"></textarea>
<button onclick="uploadItem()">Upload</button>
<p id="uploadMsg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBZPDqoF3pqPvVXVigbfBlolHAakohx_VY",
authDomain: "at-data-174bc.firebaseapp.com",
projectId: "at-data-174bc",
storageBucket: "at-data-174bc.firebasestorage.app",
messagingSenderId: "278571146405",
appId: "1:278571146405:web:bb7fbacf8ec3fb54fec14c",
measurementId: "G-8PYQB40E2B"
}

/* INIT */
const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)
let currentUser = null
let userViews = {} // untuk track 1 akun 1 view

/* PAGE */
window.showPage = function(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}

/* AUTH */
window.register=async function(){
let email=document.getElementById("email").value
let pass=document.getElementById("password").value
try{
await createUserWithEmailAndPassword(auth,email,pass)
document.getElementById("loginMsg").innerText="Register berhasil"
}catch(e){
document.getElementById("loginMsg").innerText=e.message
}
}

window.login=async function(){
let email=document.getElementById("email").value
let pass=document.getElementById("password").value
try{
await signInWithEmailAndPassword(auth,email,pass)
document.getElementById("loginMsg").innerText="Login berhasil"
}catch(e){
document.getElementById("loginMsg").innerText=e.message
}
}

window.logout=function(){
signOut(auth)
}

/* UPDATE UPLOAD FORM */
window.updateUploadForm = function(){
const type = document.getElementById("uploadType").value
if(type=="game"){
document.getElementById("itemLink").style.display="block"
document.getElementById("itemCode").style.display="none"
}else{
document.getElementById("itemLink").style.display="none"
document.getElementById("itemCode").style.display="block"
}
}

/* ON AUTH CHANGE */
onAuthStateChanged(auth,user=>{
currentUser=user
const loginBtn = document.getElementById("loginBtn")
const userInfo = document.getElementById("userInfo")
const userEmail = document.getElementById("userEmail")
const userPhoto = document.getElementById("userPhoto")
if(user){
loginBtn.style.display="none"
userInfo.style.display="flex"
userEmail.innerText=user.email
userPhoto.src=`https://ui-avatars.com/api/?name=${user.email}`
}else{
loginBtn.style.display="inline-block"
userInfo.style.display="none"
}
loadItems()
})

/* UPLOAD */
window.uploadItem=async function(){
if(!currentUser){ alert("Login dulu"); return }

const type=document.getElementById("uploadType").value
const name=document.getElementById("itemName").value
const link=document.getElementById("itemLink").value
const code=document.getElementById("itemCode").value
const desc=document.getElementById("itemDesc").value

if(!name || (type=="game" && !link) || (type=="script" && !code)){
document.getElementById("uploadMsg").innerText="Isi semua field yang diperlukan!"
return
}

await addDoc(collection(db,type+"s"),{
name, link, code, desc, user:currentUser.email, views:0, likes:0
})
document.getElementById("uploadMsg").innerText="Upload berhasil!"
loadItems()
}

/* LOAD ITEMS */
async function loadItems(){
const gameList = document.getElementById("gameList")
gameList.innerHTML=""
const gameSnap = await getDocs(collection(db,"games"))
gameSnap.forEach(docSnap=>{
const g = docSnap.data()
const card = document.createElement("div")
card.className="card"
card.innerHTML=`
<h3>${g.name}</h3>
<p>${g.desc||''}</p>
<button onclick="playGame('${docSnap.id}','${g.link}')">Play</button>
`
gameList.appendChild(card)
})

const scriptList = document.getElementById("scriptList")
scriptList.innerHTML=""
const scriptSnap = await getDocs(collection(db,"scripts"))
scriptSnap.forEach(docSnap=>{
const s = docSnap.data()
const card = document.createElement("div")
card.className="card"
card.innerHTML=`
<h3>${s.name}</h3>
<p>${s.desc||''}</p>
<pre>${s.code}</pre>
<button onclick="copyScript('${s.code}','${docSnap.id}')">Copy</button>
`
scriptList.appendChild(card)
})
}

/* VIEWS */
window.playGame = async function(id,link){
if(currentUser && !userViews[id]){
userViews[id] = true
const ref = doc(db,"games",id)
const data = await getDocs(collection(db,"games"))
await updateDoc(ref,{views:(data.views||0)+1})
}
window.open(link)
}

window.copyScript = async function(code,id){
navigator.clipboard.writeText(code)
if(currentUser && !userViews[id]){
userViews[id] = true
const ref = doc(db,"scripts",id)
await updateDoc(ref,{views:1})
alert("Copied!")
}
}

/* INIT */
loadItems()
updateUploadForm()
</script>

</body>
</html>
